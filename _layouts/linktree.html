<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.data.settings.title }} — Links</title>
  <meta name="description" content="{{ site.data.settings.description }}">

  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ site.data.settings.title }}">
  <meta name="twitter:description" content="{{ site.data.settings.description }}">

  <!-- Facebook OpenGraph -->
  <meta property="og:title" content="{{ site.data.settings.title }}">
  <meta property="og:description" content="{{ site.data.settings.description }}">

  <!-- Fonts: only used weights -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0e15;
      --bg-dark: #09080f;
      --bg-card: rgba(23, 21, 30, 0.82);
      --bg-card-hover: rgba(30, 28, 40, 0.9);
      --brand: #ff7b7b;
      --text: #eee;
      --text-muted: #aaa;
      --text-dim: #555;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --transition: 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ---- Hero Background ---- */
    .hero-bg {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 45vh;
      z-index: 0;
      overflow: hidden;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.35) saturate(0.6);
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(15, 14, 21, 0.2) 0%,
        rgba(15, 14, 21, 0.65) 55%,
        var(--bg) 100%);
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 24px 80px;
    }

    /* ---- Profile Section ---- */
    .profile {
      text-align: center;
      margin-bottom: 72px;
      padding-top: 16px;
    }

    .profile__avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,123,123,0.25);
      margin-bottom: 28px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .profile__avatar:hover {
      border-color: var(--brand);
      box-shadow: 0 0 28px rgba(255,123,123,0.2);
    }

    .profile__name {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1;
      margin-bottom: 28px;
      /* Subtle brand gradient on name */
      background: linear-gradient(135deg, #fff 50%, #ff9b9b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .profile__bio {
      max-width: 420px;
      margin: 0 auto;
    }

    .profile__bio-quote {
      font-size: 15px;
      font-style: italic;
      font-weight: 300;
      color: var(--text);
      line-height: 1.85;
      margin-bottom: 14px;
      letter-spacing: 0.1px;
    }

    .profile__bio-divider {
      width: 28px;
      height: 1px;
      background: rgba(255,123,123,0.35);
      margin: 0 auto 14px;
    }

    .profile__bio-kr {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.95;
      margin-bottom: 16px;
      font-weight: 400;
    }

    .profile__bio-attr {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* ---- Section Label ---- */
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-bottom: 16px;
      padding-left: 2px;
    }

    .section-label::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 13px;
      background: var(--brand);
      border-radius: 2px;
      opacity: 0.55;
      flex-shrink: 0;
    }

    /* ---- Link Cards ---- */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* replaces inline style="margin-bottom:32px" */
    .links--section {
      margin-bottom: 32px;
    }

    .link-card {
      background: var(--bg-card);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      /* specific props only — avoids layout recalculation from 'all' */
      transition:
        background-color var(--transition),
        border-color var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
    }

    .link-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    }

    .link-card__header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
    }

    .link-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      transition: transform var(--transition);
    }

    .link-card:hover .link-card__icon {
      transform: scale(1.06);
    }

    .link-card__info { flex: 1; min-width: 0; }

    .link-card__title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 1px;
    }

    .link-card__desc {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .link-card__arrow {
      color: var(--text-dim);
      font-size: 13px;
      transition: transform var(--transition), color var(--transition);
      flex-shrink: 0;
    }

    .link-card:hover .link-card__arrow {
      color: var(--brand);
      transform: translateX(4px);
    }

    /* ---- Featured Items ---- */
    .link-card__divider {
      height: 1px;
      background: var(--border);
      margin: 0 20px;
    }

    .link-card__items {
      padding: 14px 20px 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .featured-item {
      text-decoration: none;
      color: inherit;
      display: block;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      transition:
        border-color var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
    }

    .featured-item:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.45);
    }

    /* image zoom on hover */
    .featured-item__thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--bg-dark);
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .featured-item:hover .featured-item__thumb {
      transform: scale(1.05);
    }

    .featured-item__label {
      padding: 10px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Loading skeleton */
    .featured-item--loading {
      pointer-events: none;
    }

    .featured-item--loading .featured-item__thumb {
      background: linear-gradient(90deg, var(--bg-dark) 25%, #1a1825 50%, var(--bg-dark) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .featured-item--loading .featured-item__label {
      color: transparent;
      border-radius: 4px;
      margin: 10px;
      padding: 0;
      height: 12px;
      width: 65%;
      background: linear-gradient(90deg, var(--bg-dark) 25%, #1a1825 50%, var(--bg-dark) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ---- Platform Icon Colors ---- */
    .icon--soundcloud { background: linear-gradient(135deg, #ff5500, #ff7700); color: #fff; }
    .icon--instagram  { background: linear-gradient(135deg, #833AB4, #E1306C, #F77737); color: #fff; }
    .icon--instagram2 { background: linear-gradient(135deg, #405DE6, #5851DB, #833AB4); color: #fff; }
    .icon--melon      { background: linear-gradient(135deg, #00cd3c, #00a832); color: #fff; }
    .icon--brunch     { background: #111; color: #ddd; border: 1px solid rgba(255,255,255,0.1); }
    .icon--velog      { background: linear-gradient(135deg, #20c997, #12b886); color: #fff; }
    .icon--github     { background: #ececec; color: #0a0a0a; }
    .icon--naver      { background: #03C75A; color: #fff; }

    /* ---- Social Grid ---- */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .social-card {
      background: var(--bg-card);
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 16px 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      transition:
        background-color var(--transition),
        border-color var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
    }

    .social-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    /* Instagram hover: subtle pink tint */
    .social-card--instagram:hover { background: rgba(225, 48, 108, 0.1); }
    /* 지식산책 hover: subtle purple tint */
    .social-card--instagram2:hover { background: rgba(88, 81, 219, 0.1); }
    /* Naver hover: subtle green tint */
    .social-card--naver:hover { background: rgba(3, 199, 90, 0.08); }

    .social-card__icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: transform var(--transition);
    }

    .social-card:hover .social-card__icon {
      transform: scale(1.08);
    }

    .social-card__name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1.3;
    }

    .social-card__handle {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 400;
      margin-top: -4px;
    }

    /* ---- Footer ---- */
    .footer {
      text-align: center;
      margin-top: 56px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }

    .footer__social {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 14px;
    }

    .footer__social a {
      color: var(--text-dim);
      font-size: 17px;
      transition: color var(--transition), transform var(--transition);
    }

    .footer__social a:hover {
      color: var(--brand);
      transform: translateY(-2px);
    }

    .footer__text {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ---- Responsive ---- */
    @media (max-width: 520px) {
      .page-wrapper       { padding: 56px 16px 56px; }
      .profile__name      { font-size: 34px; }
      .profile__avatar    { width: 96px; height: 96px; }
      .profile__bio-quote { font-size: 14px; }
      .profile__bio-kr    { font-size: 12px; }

      .link-card__header  { padding: 14px 16px; gap: 12px; }
      .link-card__items   { padding: 10px 16px 14px; gap: 8px; }
      .link-card__icon    { width: 40px; height: 40px; font-size: 18px; border-radius: 10px; }
      .featured-item__label { padding: 8px; font-size: 10px; }

      .social-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .social-card {
        flex-direction: row;
        text-align: left;
        padding: 16px 20px;
        gap: 14px;
      }
      .social-card__icon  { width: 44px; height: 44px; font-size: 20px; flex-shrink: 0; }
      .social-card__texts { flex: 1; }
    }

    /* ---- Entrance Animations ---- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profile {
      animation: fadeInUp 0.55s ease-out;
    }

    .link-card {
      opacity: 0;
      animation: fadeInUp 0.45s ease-out forwards;
    }

    .link-card:nth-child(1) { animation-delay: 0.07s; }
    .link-card:nth-child(2) { animation-delay: 0.13s; }
    .link-card:nth-child(3) { animation-delay: 0.19s; }
    .link-card:nth-child(4) { animation-delay: 0.25s; }
    .link-card:nth-child(5) { animation-delay: 0.31s; }
    .link-card:nth-child(6) { animation-delay: 0.37s; }
    .link-card:nth-child(7) { animation-delay: 0.43s; }

    .social-card {
      opacity: 0;
      animation: fadeInUp 0.45s ease-out forwards;
    }

    .social-card:nth-child(1) { animation-delay: 0.48s; }
    .social-card:nth-child(2) { animation-delay: 0.52s; }
    .social-card:nth-child(3) { animation-delay: 0.56s; }

    /* ---- Profile Modal ---- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(9, 8, 15, 0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .modal-box {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      background: rgba(20, 18, 28, 0.92);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      overflow: hidden;
      transform: scale(0.94) translateY(12px);
      transition:
        transform 0.42s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        opacity 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      opacity: 0;
    }

    .modal-backdrop.is-open .modal-box {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text-muted);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.15);
      color: var(--text);
    }

    .modal-photo {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .modal-photo-wrap {
      position: relative;
    }

    .modal-photo-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to top, rgba(20,18,28,0.92) 0%, transparent 100%);
    }

    .modal-body {
      padding: 20px 28px 32px;
    }

    .modal-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #fff 50%, #ff9b9b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-eng {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .modal-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 20px;
    }

    .modal-info {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-info li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .modal-info li .modal-info__icon {
      color: var(--brand);
      opacity: 0.7;
      font-size: 12px;
      margin-top: 2px;
      flex-shrink: 0;
      width: 14px;
    }

    /* cursor hint on avatar */
    .profile__avatar {
      cursor: pointer;
    }

    /* ---- Accessibility: respect reduced motion ---- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .link-card, .social-card { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="hero-bg">
    <img src="{{ site.data.settings.hero.image | relative_url }}" alt="" aria-hidden="true">
  </div>

  <div class="page-wrapper">
    {{ content }}
  </div>

  <script>
  // XSS 방지: innerHTML 삽입 전 HTML 이스케이프
  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // URL 검증: http/https 스킴만 허용
  function safeUrl(url) {
    try {
      const u = new URL(url);
      return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '#';
    } catch { return '#'; }
  }

  // =============================================
  // Auto-fetch: GitHub repos (latest 3 by push)
  // =============================================
  async function fetchGitHub() {
    const container = document.getElementById('github-items');
    if (!container) return;
    try {
      const res = await fetch('https://api.github.com/users/hyungyugod/repos?sort=pushed&per_page=3');
      if (!res.ok) throw new Error('GitHub ' + res.status);
      const repos = await res.json();
      if (!repos.length) throw new Error('No repos');

      container.innerHTML = repos.map(repo => {
        const lang = esc(repo.language || '');
        const abbr = lang ? lang.substring(0, 2).toUpperCase() : '</>';
        const name = esc(repo.name);
        const stars = esc(repo.stargazers_count);
        const href = safeUrl(repo.html_url);

        return `<a class="featured-item" href="${href}" target="_blank" rel="noopener">
          <svg class="featured-item__thumb" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="200" height="200" fill="#0d1117"/>
            <text x="100" y="90" text-anchor="middle" font-family="Inter,sans-serif" font-size="40" font-weight="800" fill="#30363d">${abbr}</text>
            <text x="100" y="114" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#58a6ff" opacity="0.7">${lang || 'Code'}</text>
            <text x="100" y="148" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#8b949e">★ ${stars}</text>
          </svg>
          <div class="featured-item__label">${name}</div>
        </a>`;
      }).join('');
    } catch (e) {
      console.warn('GitHub fetch failed:', e);
      container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-dim);font-size:12px;">불러오기 실패</div>';
    }
  }

  // =============================================
  // Auto-fetch: Velog posts (latest 3 via RSS)
  // Proxy: codetabs.com returns raw XML text
  // =============================================
  async function fetchVelog() {
    const container = document.getElementById('velog-items');
    if (!container) return;
    try {
      const rssUrl = 'https://v2.velog.io/rss/@hyungyugod';
      const res = await fetch('https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(rssUrl));
      if (!res.ok) throw new Error('Velog proxy ' + res.status);

      const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
      const items = Array.from(xml.querySelectorAll('item')).slice(0, 3);
      if (!items.length) throw new Error('No items');

      container.innerHTML = items.map(item => {
        const title = esc(item.querySelector('title')?.textContent?.trim() || 'Untitled');

        // <link> in RSS 2.0 is a text node sibling, not element content
        const linkEl = item.querySelector('link');
        const rawLink = linkEl?.textContent?.trim()
          || linkEl?.nextSibling?.nodeValue?.trim()
          || '';
        const href = safeUrl(rawLink);

        // Image: description HTML → enclosure → media:content
        const descHtml = item.querySelector('description')?.textContent || '';
        const imgMatch = descHtml.match(/<img[^>]+src=["']([^"']+)["']/i);
        const imgUrl = imgMatch?.[1]
          || item.querySelector('enclosure')?.getAttribute('url')
          || item.querySelector('content')?.getAttribute('url')
          || '';

        const thumbHtml = imgUrl
          ? `<img class="featured-item__thumb" src="${esc(imgUrl)}" alt="" loading="lazy">`
          : `<svg class="featured-item__thumb" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <rect width="200" height="200" fill="#0a1a14"/>
              <text x="100" y="97" text-anchor="middle" font-family="Inter,sans-serif" font-size="52" font-weight="800" fill="#20c997" opacity="0.18">V</text>
              <text x="100" y="118" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#20c997" opacity="0.3">velog</text>
            </svg>`;

        return `<a class="featured-item" href="${href}" target="_blank" rel="noopener">
          ${thumbHtml}
          <div class="featured-item__label">${title}</div>
        </a>`;
      }).join('');
    } catch (e) {
      console.warn('Velog fetch failed:', e);
      container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-dim);font-size:12px;">불러오기 실패</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    fetchGitHub();
    fetchVelog();
    initModal();
  });

  // =============================================
  // Profile Modal
  // =============================================
  function initModal() {
    const backdrop = document.getElementById('profileModal');
    const avatar   = document.getElementById('profileAvatar');
    if (!backdrop || !avatar) return;

    const focusable = backdrop.querySelector('.modal-close');

    function open() {
      backdrop.classList.add('is-open');
      document.body.style.overflow = 'hidden';
      focusable?.focus();
    }

    function close() {
      backdrop.classList.remove('is-open');
      document.body.style.overflow = '';
      avatar.focus();
    }

    avatar.addEventListener('click', open);

    // Close on overlay click
    backdrop.querySelector('.modal-overlay').addEventListener('click', close);

    // Close on X button
    backdrop.querySelector('.modal-close').addEventListener('click', close);

    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && backdrop.classList.contains('is-open')) close();
    });
  }
  </script>

  <!-- Profile Modal -->
  <div class="modal-backdrop" id="profileModal" role="dialog" aria-modal="true" aria-label="프로필">

    </div>
