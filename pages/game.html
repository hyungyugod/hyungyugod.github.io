<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <title>Pixel Nurse Note-Catcher · hgfolio</title>
  <meta name="description" content="30초 안에 음표를 가장 많이 모으는 미니 픽셀 게임." />
  <link rel="icon" href="/favicon.ico" />

  <!-- FOUC 방지 테마 복원 (라이트 모드는 <html>.light) -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('theme') === 'light') {
          document.documentElement.classList.add('light');
        }
      } catch (e) { /* 저장소 접근 불가 시 다크 기본 */ }
    })();
  </script>

  <link rel="stylesheet" href="/assets/css/style.css" />

  <style>
    /* =====================================================
       Pixel Nurse — 게임 페이지 전용 스타일
       본체 스타일의 --brand, --bg-card, --radius, --text 등 재사용
       ===================================================== */

    body.game-page {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      gap: 18px;
      touch-action: manipulation;
      overscroll-behavior: contain;
      -webkit-tap-highlight-color: transparent;
    }

    .game-topbar {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .game-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-decoration: none;
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.25s var(--spring-bounce);

      &:hover {
        border-color: var(--brand-40);
        color: var(--brand-light);
        transform: translateX(-2px);
      }
    }

    .game-theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      transition: background 0.25s, border-color 0.25s, color 0.25s;

      &:hover {
        border-color: var(--brand-40);
        color: var(--brand-light);
      }

      & .game-theme-toggle__icon {
        font-size: 14px;
      }
    }

    .game-shell {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .game-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .game-header__title {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .game-header__subtitle {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .game-stage {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
    }

    .game-hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 4px;
      font-variant-numeric: tabular-nums;
    }

    .game-hud__slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
    }

    .game-hud__label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
    }

    .game-hud__value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .game-hud__value.is-warning {
      color: var(--brand-light);
      animation: gamePulse 0.8s ease-in-out infinite;
    }

    @keyframes gamePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .game-canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      background: var(--bg-dark);
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    .game-overlay {
      position: absolute;
      inset: 0;
      background: rgba(9, 8, 15, 0.78);
      backdrop-filter: blur(8px) saturate(1.1);
      -webkit-backdrop-filter: blur(8px) saturate(1.1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 2;
    }

    .game-overlay.is-hidden {
      display: none;
    }

    html.light .game-overlay {
      background: rgba(245, 244, 248, 0.78);
    }

    .game-overlay__panel {
      width: 100%;
      max-width: 360px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: center;
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .game-overlay__title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
    }

    .game-overlay__desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .game-difficulty {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .game-difficulty__btn {
      flex: 1;
      min-width: 80px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;

      &:hover {
        border-color: var(--border-hover);
        color: var(--text);
      }

      &[aria-checked="true"] {
        background: var(--brand-12);
        border-color: var(--brand-40);
        color: var(--brand-light);
        box-shadow: 0 0 14px var(--brand-08);
      }

      &:focus-visible {
        outline: 2px solid var(--brand-40);
        outline-offset: 2px;
      }
    }

    .game-cta {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .game-btn {
      padding: 10px 22px;
      border: 1px solid var(--brand-40);
      border-radius: 999px;
      background: var(--brand-12);
      color: var(--brand-light);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s, transform 0.25s var(--spring-bounce);

      &:hover {
        background: var(--brand-20);
        border-color: var(--brand-60);
        box-shadow: 0 0 18px var(--brand-14);
        transform: translateY(-1px);
      }

      &:focus-visible {
        outline: 2px solid var(--brand-40);
        outline-offset: 2px;
      }

      &--ghost {
        background: transparent;
        border-color: var(--border);
        color: var(--text-muted);

        &:hover {
          border-color: var(--border-hover);
          color: var(--text);
          background: var(--bg-card-hover);
        }
      }
    }

    .game-overlay__score {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .game-overlay__score-num {
      font-family: var(--font-serif);
      font-size: 40px;
      font-weight: 600;
      color: var(--brand-light);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .game-overlay__record {
      font-size: 12px;
      color: var(--brand);
      font-weight: 600;
      letter-spacing: 0.5px;
      min-height: 16px;
    }

    .game-controls {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    .game-controls__key {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-family: monospace;
      font-size: 10px;
      margin: 0 2px;
    }

    .game-footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    /* 가상 D-Pad (모바일 터치 컨트롤) */
    .game-touchpad {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 4px 0 0;
    }

    .game-touchpad[hidden] {
      display: none;
    }

    .game-touchpad__dpad {
      position: relative;
      width: 168px;
      height: 168px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
    }

    .game-touchpad__btn {
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s var(--spring-bounce);

      &:active,
      &.is-pressed {
        background: var(--brand-12);
        border-color: var(--brand-40);
        color: var(--brand-light);
        transform: scale(0.94);
      }

      &:focus-visible {
        outline: 2px solid var(--brand-40);
        outline-offset: 2px;
      }
    }

    .game-touchpad__btn--up    { grid-column: 2; grid-row: 1; }
    .game-touchpad__btn--left  { grid-column: 1; grid-row: 2; }
    .game-touchpad__btn--right { grid-column: 3; grid-row: 2; }
    .game-touchpad__btn--down  { grid-column: 2; grid-row: 3; }

    /* 반응형 (520px 이하) */
    @media (max-width: 520px) {
      body.game-page {
        padding: 16px 10px 32px;
      }

      .game-header__title {
        font-size: 24px;
      }

      .game-header__subtitle {
        font-size: 11px;
      }

      .game-hud__label {
        font-size: 9px;
        letter-spacing: 1px;
      }

      .game-hud__value {
        font-size: 17px;
      }

      .game-overlay__panel {
        padding: 16px 14px;
        gap: 12px;
      }

      .game-overlay__title {
        font-size: 18px;
      }

      .game-overlay__score-num {
        font-size: 32px;
      }

      .game-difficulty {
        flex-direction: column;
      }

      .game-difficulty__btn {
        width: 100%;
      }

      .game-cta {
        flex-direction: column;
      }

      .game-btn {
        width: 100%;
      }

      .game-touchpad__dpad {
        width: 192px;
        height: 192px;
      }

      .game-canvas-wrap {
        aspect-ratio: 4 / 3;
      }

      .game-controls {
        display: none;
      }
    }

    /* 접근성 — reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .game-hud__value.is-warning {
        animation: none;
      }

      * {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="game-page">

  <div class="game-topbar">
    <a class="game-back" href="/">← 돌아가기</a>
    <button class="game-theme-toggle js-theme-toggle" type="button" aria-label="테마 전환">
      <span class="game-theme-toggle__icon" aria-hidden="true">◐</span>
    </button>
  </div>

  <main class="game-shell">
    <header class="game-header">
      <h1 class="game-header__title">Pixel Nurse Note-Catcher</h1>
      <p class="game-header__subtitle">30초 안에 음표를 최대한 많이 모아보세요.</p>
    </header>

    <section class="game-stage" aria-label="게임 화면">
      <div class="game-hud" aria-live="off">
        <div class="game-hud__slot">
          <span class="game-hud__label">Time</span>
          <span class="game-hud__value" id="hudTime">30</span>
        </div>
        <div class="game-hud__slot">
          <span class="game-hud__label">Score</span>
          <span class="game-hud__value" id="hudScore">0</span>
        </div>
        <div class="game-hud__slot">
          <span class="game-hud__label">Best</span>
          <span class="game-hud__value" id="hudBest">0</span>
        </div>
      </div>

      <div class="game-canvas-wrap">
        <canvas id="gameCanvas" width="640" height="400" aria-label="Pixel Nurse 게임 캔버스"></canvas>

        <!-- 시작 오버레이 -->
        <div class="game-overlay" id="overlayStart">
          <div class="game-overlay__panel" role="dialog" aria-labelledby="startTitle">
            <h2 class="game-overlay__title" id="startTitle">난이도 선택</h2>
            <p class="game-overlay__desc">화살표 또는 <span class="game-controls__key">W</span><span class="game-controls__key">A</span><span class="game-controls__key">S</span><span class="game-controls__key">D</span>로 간호사를 움직여 음표를 수집하세요. 모바일에서는 화면 아래 방향패드를 사용하세요.</p>
            <div class="game-difficulty" role="radiogroup" aria-label="난이도">
              <button class="game-difficulty__btn" type="button" role="radio" aria-checked="true" data-diff="easy">하 · Easy</button>
              <button class="game-difficulty__btn" type="button" role="radio" aria-checked="false" data-diff="normal">중 · Normal</button>
              <button class="game-difficulty__btn" type="button" role="radio" aria-checked="false" data-diff="hard">상 · Hard</button>
            </div>
            <div class="game-cta">
              <button class="game-btn" type="button" id="btnStart">시작</button>
            </div>
          </div>
        </div>

        <!-- 종료 오버레이 -->
        <div class="game-overlay is-hidden" id="overlayEnd">
          <div class="game-overlay__panel" role="dialog" aria-labelledby="endTitle">
            <h2 class="game-overlay__title" id="endTitle">타임 오버</h2>
            <div class="game-overlay__score" aria-live="polite" id="endScoreWrap">
              <span>이번 점수</span>
              <span class="game-overlay__score-num" id="endScore">0</span>
              <span class="game-overlay__record" id="endRecord"></span>
            </div>
            <div class="game-cta">
              <button class="game-btn" type="button" id="btnReplay">다시 플레이</button>
              <a class="game-btn game-btn--ghost" href="/">홈으로</a>
            </div>
          </div>
        </div>
      </div>

      <div class="game-touchpad" id="gameTouchpad" aria-hidden="true" hidden>
        <div class="game-touchpad__dpad">
          <button class="game-touchpad__btn game-touchpad__btn--up"    type="button" data-dir="up"    aria-label="위로 이동">▲</button>
          <button class="game-touchpad__btn game-touchpad__btn--left"  type="button" data-dir="left"  aria-label="왼쪽으로 이동">◀</button>
          <button class="game-touchpad__btn game-touchpad__btn--right" type="button" data-dir="right" aria-label="오른쪽으로 이동">▶</button>
          <button class="game-touchpad__btn game-touchpad__btn--down"  type="button" data-dir="down"  aria-label="아래로 이동">▼</button>
        </div>
      </div>

      <div class="game-controls" aria-hidden="true">
        <span>이동 <span class="game-controls__key">←↑↓→</span> / <span class="game-controls__key">WASD</span></span>
        <span>수집 <span class="game-controls__key">접촉</span></span>
      </div>
    </section>

    <footer class="game-footer">
      © hgfolio · a tiny room to catch your breath
    </footer>
  </main>

  <script>
    (function () {
      'use strict';

      // =====================================================
      // 테마 토글 (main.js initThemeToggle과 동일 로직 재현)
      // =====================================================
      const themeBtn = document.querySelector('.js-theme-toggle');
      if (themeBtn) {
        themeBtn.addEventListener('click', () => {
          const isLight = document.documentElement.classList.toggle('light');
          try {
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
          } catch (e) { /* 저장 실패 무시 */ }
        });
      }

      // =====================================================
      // 상수 & 설정
      // =====================================================
      const TILE = 20;
      const COLS = 32;
      const ROWS = 20;
      const CANVAS_W = COLS * TILE; // 640
      const CANVAS_H = ROWS * TILE; // 400
      const GAME_DURATION = 30; // 초
      const STORAGE_KEY = 'pixelNurseBest';

      const DIFFICULTY = {
        easy:   { speed: 180, notes: 6, noteTtl: Infinity, obstacles: 0, obsSpeed: 0,   stun: 0,   map: 'easy' },
        normal: { speed: 140, notes: 4, noteTtl: 5000,     obstacles: 2, obsSpeed: 90,  stun: 500, map: 'normal' },
        hard:   { speed: 100, notes: 2, noteTtl: 2500,     obstacles: 5, obsSpeed: 150, stun: 800, map: 'hard' }
      };

      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // =====================================================
      // 맵 생성 — 0=빈칸, 1=벽
      // =====================================================
      function buildMap(kind) {
        const m = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        // 외곽 벽
        for (let c = 0; c < COLS; c++) { m[0][c] = 1; m[ROWS - 1][c] = 1; }
        for (let r = 0; r < ROWS; r++) { m[r][0] = 1; m[r][COLS - 1] = 1; }

        if (kind === 'easy') {
          // 중앙 기둥 한 개
          for (let r = 8; r <= 11; r++) {
            for (let c = 15; c <= 16; c++) m[r][c] = 1;
          }
        } else if (kind === 'normal') {
          // 중앙 가로 복도 + 방 2개 (좌상, 우하)
          // 좌상 방: 벽으로 둘러싸인 구역 (복도 개방구 있음)
          for (let c = 4; c <= 10; c++) m[5][c] = 1;
          for (let r = 2; r <= 5; r++) m[r][10] = 1;
          m[3][10] = 0; // 문

          // 우하 방
          for (let c = 21; c <= 27; c++) m[14][c] = 1;
          for (let r = 14; r <= 17; r++) m[r][21] = 1;
          m[16][21] = 0; // 문

          // 중앙 기둥
          for (let r = 9; r <= 10; r++) {
            for (let c = 15; c <= 16; c++) m[r][c] = 1;
          }
        } else {
          // hard: 모서리 방 4개 + 기둥 다수
          // 좌상
          for (let c = 4; c <= 9; c++) m[5][c] = 1;
          for (let r = 2; r <= 5; r++) m[r][9] = 1;
          m[3][9] = 0;
          // 우상
          for (let c = 22; c <= 27; c++) m[5][c] = 1;
          for (let r = 2; r <= 5; r++) m[r][22] = 1;
          m[3][22] = 0;
          // 좌하
          for (let c = 4; c <= 9; c++) m[14][c] = 1;
          for (let r = 14; r <= 17; r++) m[r][9] = 1;
          m[16][9] = 0;
          // 우하
          for (let c = 22; c <= 27; c++) m[14][c] = 1;
          for (let r = 14; r <= 17; r++) m[r][22] = 1;
          m[16][22] = 0;
          // 중앙 기둥들
          for (let r = 9; r <= 10; r++) { m[r][12] = 1; m[r][19] = 1; }
          m[7][15] = 1; m[7][16] = 1;
          m[12][15] = 1; m[12][16] = 1;
        }

        return m;
      }

      function isWallAt(map, px, py, w, h) {
        // 픽셀 AABB → 타일 충돌
        const left = Math.floor(px / TILE);
        const right = Math.floor((px + w - 1) / TILE);
        const top = Math.floor(py / TILE);
        const bottom = Math.floor((py + h - 1) / TILE);
        for (let r = top; r <= bottom; r++) {
          for (let c = left; c <= right; c++) {
            if (r < 0 || c < 0 || r >= ROWS || c >= COLS) return true;
            if (map[r][c] === 1) return true;
          }
        }
        return false;
      }

      function findEmptyTile(map, rng) {
        for (let tries = 0; tries < 200; tries++) {
          const c = 1 + Math.floor(rng() * (COLS - 2));
          const r = 1 + Math.floor(rng() * (ROWS - 2));
          if (map[r][c] === 0) return { c, r };
        }
        // fallback 선형 탐색
        for (let r = 1; r < ROWS - 1; r++) {
          for (let c = 1; c < COLS - 1; c++) {
            if (map[r][c] === 0) return { c, r };
          }
        }
        return { c: 1, r: 1 };
      }

      // =====================================================
      // 사운드 (WebAudio) — 짧은 사인파 톤
      // =====================================================
      let audioCtx = null;
      function playTone(freq, duration) {
        try {
          if (!audioCtx) {
            const Ctor = window.AudioContext || window.webkitAudioContext;
            if (!Ctor) return;
            audioCtx = new Ctor();
          }
          if (audioCtx.state === 'suspended') audioCtx.resume();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + duration + 0.02);
        } catch (e) { /* 오디오 실패 무시 */ }
      }

      // =====================================================
      // 렌더링
      // =====================================================
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;

      function isLightTheme() {
        return document.documentElement.classList.contains('light');
      }

      function themeColors() {
        const light = isLightTheme();
        return {
          floorA: light ? '#eceaf0' : '#1a1825',
          floorB: light ? '#e2dfe8' : '#15131e',
          wall:   light ? '#d4ccd6' : '#2a2233',
          wallHi: light ? '#bfb6c0' : '#3a3245',
          brand:  light ? '#b07068' : '#c4847a',
          brandHi:light ? '#c48a82' : '#d4a49c'
        };
      }

      function drawMap(map) {
        const col = themeColors();
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const x = c * TILE, y = r * TILE;
            if (map[r][c] === 1) {
              ctx.fillStyle = col.wall;
              ctx.fillRect(x, y, TILE, TILE);
              // 블록 하이라이트 (위·왼쪽 1px)
              ctx.fillStyle = col.wallHi;
              ctx.fillRect(x, y, TILE, 2);
              ctx.fillRect(x, y, 2, TILE);
            } else {
              // 체크 바닥
              ctx.fillStyle = ((r + c) & 1) ? col.floorA : col.floorB;
              ctx.fillRect(x, y, TILE, TILE);
            }
          }
        }
      }

      // 픽셀 간호사 (16x20) — 치비/SD 비율 (2.2등신)
      // '.'=투명, 'S'=피부, 'H'=머리카락, 'W'=흰옷, 'D'=모자 음영, 'C'=코럴십자
      // 'E'=눈 동공, 'L'=눈 하이라이트(흰자), 'R'=볼터치, 'M'=입, 'P'=하의, 'B'=신발
      // 방향(dir): 'down','up','left','right', 프레임(frame): 0 idle, 1/2 step
      const NURSE_W = 16;
      const NURSE_H = 20;
      function nurseSprite(dir, frame) {
        // 16x20 — 머리(행 1-10, 50%) + 몸통/다리(행 11-19)
        const base = [
          '................', // 0
          '....WWWWWWWW....', // 1 모자 상단
          '...WWWWCCWWWW...', // 2 모자 중단 + 코럴 십자
          '..WDDDDDDDDDDW..', // 3 모자 그림자 라인
          '..HHSSSSSSSSHH..', // 4 앞머리 + 이마
          '..HSSSSSSSSSSH..', // 5
          '..SSEESSSSEESS..', // 6 눈 동공
          '..SSELSSSSELSS..', // 7 눈 하이라이트
          '..RSSSSMMSSSSR..', // 8 볼터치 + 작은 입
          '..SSSSSSSSSSSS..', // 9
          '...SSSSSSSSSS...', // 10 턱
          '....WWWWWWWW....', // 11 어깨/상의 시작
          '...WWWWCCWWWW...', // 12 가슴 십자 상단
          '...WWWCCCCWWW...', // 13 가슴 십자 중단
          '....WWWWWWWW....', // 14 상의 밑단
          '....PPPPPPPP....', // 15 하의 시작
          '....PPP..PPP....', // 16
          '....PPP..PPP....', // 17
          '....BB....BB....', // 18 발
          '....BB....BB....'  // 19
        ];

        // 방향별 얼굴 처리
        if (dir === 'up') {
          // 뒷모습 — 얼굴 자리 전체를 머리카락으로
          base[4] = '..HHHHHHHHHHHH..';
          base[5] = '..HHHHHHHHHHHH..';
          base[6] = '..HHHHHHHHHHHH..';
          base[7] = '..HHHHHHHHHHHH..';
          base[8] = '..HHHHHHHHHHHH..';
          base[9] = '..HHHHHHHHHHHH..';
          base[10] = '...HHHHHHHHHH...';
        } else if (dir === 'left') {
          // 오른쪽 눈만 + 오른쪽 볼
          base[6] = '..SSSSSSSSEESS..';
          base[7] = '..SSSSSSSSELSS..';
          base[8] = '..SSSSSMMSSSSR..';
        } else if (dir === 'right') {
          // 왼쪽 눈만 + 왼쪽 볼
          base[6] = '..SSEESSSSSSSS..';
          base[7] = '..SSELSSSSSSSS..';
          base[8] = '..RSSSSMMSSSSS..';
        }

        // 걷기 프레임 — 발만 교차 (행 18-19)
        if (frame === 1) {
          base[18] = '....BB...BBB....';
          base[19] = '....BBB...BB....';
        } else if (frame === 2) {
          base[18] = '....BBB...BB....';
          base[19] = '....BB...BBB....';
        }

        return base;
      }

      function drawNurse(x, y, dir, frame) {
        const sprite = nurseSprite(dir, frame);
        const palette = {
          'S': '#fbe0d0', // 피부
          'H': '#2e2020', // 머리카락
          'W': '#ffffff', // 흰옷/모자
          'D': '#e6dde6', // 모자 음영
          'C': '#c4847a', // 코럴 십자
          'P': '#e8bcb4', // 하의
          'B': '#a85f56', // 신발
          'E': '#2a1f25', // 눈 동공
          'L': '#ffffff', // 흰자 하이라이트
          'R': '#f5a8a0', // 볼터치
          'M': '#c4847a'  // 입
        };
        const SCALE = 2;
        // 히트박스(14x14) 기준 중앙 정렬. 머리가 커졌으므로 oy를 -24로 내림.
        const ox = Math.round(x) - 8;
        let oy = Math.round(y) - 24;
        // 걷기 바운스 — reduced-motion 비활성
        if (frame !== 0 && !reducedMotion) oy -= 1;
        for (let r = 0; r < 20; r++) {
          const row = sprite[r];
          for (let c = 0; c < 16; c++) {
            const ch = row[c];
            if (ch === '.' || !palette[ch]) continue;
            ctx.fillStyle = palette[ch];
            ctx.fillRect(ox + c * SCALE, oy + r * SCALE, SCALE, SCALE);
          }
        }
      }

      function drawNote(x, y, bob) {
        const col = themeColors();
        const ox = Math.round(x);
        const oy = Math.round(y + bob);
        // 12x12 8분 음표
        // 머리 (타원형 블록)
        ctx.fillStyle = col.brand;
        ctx.fillRect(ox + 1, oy + 7, 6, 4);
        ctx.fillRect(ox + 2, oy + 6, 4, 1);
        ctx.fillRect(ox + 2, oy + 11, 4, 1);
        // 하이라이트
        ctx.fillStyle = col.brandHi;
        ctx.fillRect(ox + 2, oy + 7, 1, 1);
        // 기둥
        ctx.fillStyle = col.brand;
        ctx.fillRect(ox + 6, oy + 1, 1, 7);
        // 깃발
        ctx.fillRect(ox + 6, oy + 1, 4, 1);
        ctx.fillRect(ox + 9, oy + 1, 1, 3);
        ctx.fillRect(ox + 7, oy + 4, 2, 1);
      }

      function drawObstacle(x, y) {
        // 10x10 작은 유닛 (주사기 방울 느낌 — 회색+코럴)
        const col = themeColors();
        const ox = Math.round(x);
        const oy = Math.round(y);
        ctx.fillStyle = '#6b5a72';
        ctx.fillRect(ox, oy + 2, 10, 6);
        ctx.fillRect(ox + 2, oy, 6, 10);
        ctx.fillStyle = col.brand;
        ctx.fillRect(ox + 3, oy + 3, 4, 4);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ox + 3, oy + 3, 1, 1);
      }

      // =====================================================
      // 게임 상태
      // =====================================================
      const state = {
        running: false,
        difficulty: 'easy',
        map: null,
        player: { x: 0, y: 0, w: 14, h: 14, dir: 'down', frameAcc: 0, frame: 0, stunUntil: 0 },
        notes: [],      // {x, y, born, bobSeed}
        obstacles: [],  // {x, y, dx, dy}
        keys: Object.create(null),
        score: 0,
        timeLeft: GAME_DURATION,
        lastTs: 0,
        rafId: null,
        best: { easy: 0, normal: 0, hard: 0 }
      };

      function loadBest() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') {
            state.best.easy = Number(parsed.easy) || 0;
            state.best.normal = Number(parsed.normal) || 0;
            state.best.hard = Number(parsed.hard) || 0;
          }
        } catch (e) { /* 무시 */ }
      }

      function saveBest() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.best));
        } catch (e) { /* 무시 */ }
      }

      // =====================================================
      // DOM 참조 & UI
      // =====================================================
      const hudTime = document.getElementById('hudTime');
      const hudScore = document.getElementById('hudScore');
      const hudBest = document.getElementById('hudBest');
      const overlayStart = document.getElementById('overlayStart');
      const overlayEnd = document.getElementById('overlayEnd');
      const endScore = document.getElementById('endScore');
      const endRecord = document.getElementById('endRecord');
      const btnStart = document.getElementById('btnStart');
      const btnReplay = document.getElementById('btnReplay');
      const diffBtns = document.querySelectorAll('.game-difficulty__btn');

      function updateBestHud() {
        hudBest.textContent = String(state.best[state.difficulty] || 0);
      }

      diffBtns.forEach(b => {
        b.addEventListener('click', () => {
          diffBtns.forEach(x => x.setAttribute('aria-checked', 'false'));
          b.setAttribute('aria-checked', 'true');
          state.difficulty = b.dataset.diff;
          updateBestHud();
        });
      });

      btnStart.addEventListener('click', () => {
        // iOS 오디오 언락 — 첫 유저 제스처에서 무음 톤
        playTone(0, 0.001);
        startGame();
      });
      btnReplay.addEventListener('click', () => {
        overlayEnd.classList.add('is-hidden');
        overlayStart.classList.remove('is-hidden');
      });

      // 키보드 입력
      const KEY_MAP = {
        'ArrowUp': 'up', 'KeyW': 'up',
        'ArrowDown': 'down', 'KeyS': 'down',
        'ArrowLeft': 'left', 'KeyA': 'left',
        'ArrowRight': 'right', 'KeyD': 'right'
      };

      window.addEventListener('keydown', (e) => {
        const dir = KEY_MAP[e.code];
        if (dir) {
          state.keys[dir] = true;
          // 스크롤 방지
          if (state.running) e.preventDefault();
        }
      });
      window.addEventListener('keyup', (e) => {
        const dir = KEY_MAP[e.code];
        if (dir) state.keys[dir] = false;
      });

      // =====================================================
      // 게임 시작 / 종료
      // =====================================================
      function startGame() {
        const diff = DIFFICULTY[state.difficulty];
        state.map = buildMap(diff.map);
        state.score = 0;
        state.timeLeft = GAME_DURATION;
        state.notes = [];
        state.obstacles = [];
        state.player.x = TILE * 2 + 3;
        state.player.y = TILE * 2 + 3;
        state.player.dir = 'down';
        state.player.frame = 0;
        state.player.frameAcc = 0;
        state.player.stunUntil = 0;

        // 초기 음표 스폰
        for (let i = 0; i < diff.notes; i++) spawnNote();
        // 장애물 스폰
        for (let i = 0; i < diff.obstacles; i++) spawnObstacle();

        overlayStart.classList.add('is-hidden');
        overlayEnd.classList.add('is-hidden');

        hudTime.textContent = String(GAME_DURATION);
        hudTime.classList.remove('is-warning');
        hudScore.textContent = '0';
        updateBestHud();

        state.running = true;
        state.lastTs = performance.now();
        if (state.rafId) cancelAnimationFrame(state.rafId);
        state.rafId = requestAnimationFrame(loop);
      }

      function endGame() {
        state.running = false;
        if (state.rafId) cancelAnimationFrame(state.rafId);
        state.rafId = null;

        const prevBest = state.best[state.difficulty] || 0;
        let newRecord = false;
        if (state.score > prevBest) {
          state.best[state.difficulty] = state.score;
          saveBest();
          newRecord = true;
        }
        updateBestHud();

        endScore.textContent = String(state.score);
        endRecord.textContent = newRecord ? '신기록!' : '';
        overlayEnd.classList.remove('is-hidden');
      }

      // =====================================================
      // 스폰 로직
      // =====================================================
      function spawnNote() {
        const tile = findEmptyTile(state.map, Math.random);
        // 플레이어 근접(같은 타일) 회피 시도
        state.notes.push({
          x: tile.c * TILE + (TILE - 12) / 2,
          y: tile.r * TILE + (TILE - 12) / 2,
          born: performance.now(),
          bobSeed: Math.random() * Math.PI * 2
        });
      }

      function spawnObstacle() {
        const tile = findEmptyTile(state.map, Math.random);
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        const d = dirs[Math.floor(Math.random() * 4)];
        state.obstacles.push({
          x: tile.c * TILE + (TILE - 10) / 2,
          y: tile.r * TILE + (TILE - 10) / 2,
          dx: d[0],
          dy: d[1]
        });
      }

      // =====================================================
      // 매 프레임 업데이트
      // =====================================================
      function update(dt, now) {
        const diff = DIFFICULTY[state.difficulty];
        const p = state.player;
        const stunned = now < p.stunUntil;

        // 이동
        let vx = 0, vy = 0;
        if (!stunned) {
          if (state.keys.up) { vy -= 1; p.dir = 'up'; }
          if (state.keys.down) { vy += 1; p.dir = 'down'; }
          if (state.keys.left) { vx -= 1; p.dir = 'left'; }
          if (state.keys.right) { vx += 1; p.dir = 'right'; }
          if (vx !== 0 && vy !== 0) { vx *= 0.7071; vy *= 0.7071; }
        }

        const dx = vx * diff.speed * dt;
        const dy = vy * diff.speed * dt;

        // X축 이동 → 충돌
        if (dx !== 0) {
          const nx = p.x + dx;
          if (!isWallAt(state.map, nx, p.y, p.w, p.h)) p.x = nx;
        }
        if (dy !== 0) {
          const ny = p.y + dy;
          if (!isWallAt(state.map, p.x, ny, p.w, p.h)) p.y = ny;
        }

        // 걷기 애니메이션 프레임
        if (!reducedMotion && (vx !== 0 || vy !== 0)) {
          p.frameAcc += dt;
          if (p.frameAcc > 0.15) {
            p.frameAcc = 0;
            p.frame = p.frame === 1 ? 2 : 1;
          }
        } else {
          p.frame = 0;
        }

        // 장애물 이동
        for (const o of state.obstacles) {
          const step = diff.obsSpeed * dt;
          let tries = 0;
          let moved = false;
          while (tries < 4 && !moved) {
            const nx = o.x + o.dx * step;
            const ny = o.y + o.dy * step;
            if (!isWallAt(state.map, nx, ny, 10, 10)) {
              o.x = nx; o.y = ny; moved = true;
            } else {
              // 방향 전환 (랜덤)
              const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
              const d = dirs[Math.floor(Math.random() * 4)];
              o.dx = d[0]; o.dy = d[1];
              tries++;
            }
          }
        }

        // 음표 만료 & 보충
        if (diff.noteTtl !== Infinity) {
          state.notes = state.notes.filter(n => (now - n.born) < diff.noteTtl);
        }
        while (state.notes.length < diff.notes) spawnNote();

        // 수집 판정
        for (let i = state.notes.length - 1; i >= 0; i--) {
          const n = state.notes[i];
          if (p.x < n.x + 12 && p.x + p.w > n.x &&
              p.y < n.y + 12 && p.y + p.h > n.y) {
            state.notes.splice(i, 1);
            state.score++;
            hudScore.textContent = String(state.score);
            playTone(880, 0.08);
            spawnNote();
          }
        }

        // 장애물 충돌 (스턴)
        if (!stunned) {
          for (const o of state.obstacles) {
            if (p.x < o.x + 10 && p.x + p.w > o.x &&
                p.y < o.y + 10 && p.y + p.h > o.y) {
              p.stunUntil = now + diff.stun;
              state.score = Math.max(0, state.score - 1);
              hudScore.textContent = String(state.score);
              playTone(180, 0.15);
              // 살짝 밀어내기
              p.x = Math.max(TILE, Math.min(CANVAS_W - TILE - p.w, p.x - (o.dx * 6)));
              p.y = Math.max(TILE, Math.min(CANVAS_H - TILE - p.h, p.y - (o.dy * 6)));
              break;
            }
          }
        }

        // 타이머
        state.timeLeft -= dt;
        if (state.timeLeft <= 0) {
          hudTime.textContent = '0';
          endGame();
          return;
        }
        const tSec = Math.ceil(state.timeLeft);
        hudTime.textContent = String(tSec);
        if (tSec <= 10) hudTime.classList.add('is-warning');
        else hudTime.classList.remove('is-warning');
      }

      function render(now) {
        ctx.fillStyle = isLightTheme() ? '#e8e7ec' : '#09080f';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        drawMap(state.map);

        // 음표 (bob 애니메이션)
        for (const n of state.notes) {
          const bob = reducedMotion ? 0 : Math.sin((now / 220) + n.bobSeed) * 1.2;
          // TTL이 유한일 때 마지막 1초 깜빡임
          const diff = DIFFICULTY[state.difficulty];
          if (diff.noteTtl !== Infinity && !reducedMotion) {
            const left = diff.noteTtl - (now - n.born);
            if (left < 1000 && Math.floor(now / 120) % 2 === 0) continue;
          }
          drawNote(n.x, n.y, bob);
        }

        // 장애물
        for (const o of state.obstacles) drawObstacle(o.x, o.y);

        // 플레이어
        const p = state.player;
        const stunned = now < p.stunUntil;
        if (!stunned || Math.floor(now / 80) % 2 === 0) {
          drawNurse(p.x, p.y, p.dir, p.frame);
        }
      }

      function loop(ts) {
        if (!state.running) return;
        const now = ts;
        const dt = Math.min(0.05, (now - state.lastTs) / 1000); // 최대 50ms 클램프
        state.lastTs = now;

        update(dt, now);
        if (!state.running) {
          // endGame에서 이미 렌더가 필요하면 한 번 더
          render(now);
          return;
        }
        render(now);
        state.rafId = requestAnimationFrame(loop);
      }

      // =====================================================
      // 모바일 터치 컨트롤
      // =====================================================
      function isTouchDevice() {
        return window.matchMedia('(pointer: coarse)').matches || ('ontouchstart' in window);
      }

      function initTouchControls() {
        const pad = document.getElementById('gameTouchpad');
        if (!pad) return;
        pad.hidden = false;
        pad.setAttribute('aria-hidden', 'false');
        const controlsHint = document.querySelector('.game-controls');
        if (controlsHint) controlsHint.style.display = 'none';
        const btns = pad.querySelectorAll('.game-touchpad__btn');
        btns.forEach(btn => {
          const dir = btn.dataset.dir;
          const press = (e) => {
            e.preventDefault();
            state.keys[dir] = true;
            btn.classList.add('is-pressed');
          };
          const release = (e) => {
            e.preventDefault();
            state.keys[dir] = false;
            btn.classList.remove('is-pressed');
          };
          btn.addEventListener('pointerdown', press, { passive: false });
          btn.addEventListener('pointerup', release, { passive: false });
          btn.addEventListener('pointercancel', release, { passive: false });
          btn.addEventListener('pointerleave', release, { passive: false });
          btn.addEventListener('contextmenu', e => e.preventDefault());
        });
        canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
      }

      // =====================================================
      // 초기화
      // =====================================================
      loadBest();
      updateBestHud();
      if (isTouchDevice()) initTouchControls();

      // 기본 난이도 easy 활성 표시는 이미 HTML에서 aria-checked="true"
      // 초기에는 캔버스에 easy 맵을 스냅샷으로 그려 놓는다 (미리보기)
      (function initPreview() {
        const previewMap = buildMap('easy');
        ctx.fillStyle = isLightTheme() ? '#e8e7ec' : '#09080f';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        drawMap(previewMap);
        // 중앙에 간호사 한 명 그려두기
        drawNurse(TILE * 15 + 2, TILE * 9 + 2, 'down', 0);
      })();
    })();
  </script>
</body>
